# API Gateway route definitions
# Routes are defined inline in template.yaml using SAM Events
# This file documents the API structure

# Public endpoints:
#   POST /v1/rescue-requests - CreateRescueRequest
#   POST /v1/citizen/tracking/lookup - CitizenTrackingLookup
#   GET  /v1/citizen/rescue-requests/{requestId}/status - GetCitizenStatus
#   POST /v1/citizen/rescue-requests/{requestId}/updates - CreateCitizenUpdate
#   GET  /v1/citizen/rescue-requests/{requestId}/updates - ListCitizenUpdates

# Staff endpoints:
#   GET   /v1/rescue-requests/{requestId} - GetRescueRequest
#   PATCH /v1/rescue-requests/{requestId} - PatchRescueRequest
#   PATCH /v1/rescue-requests/{requestId}/priority - UpdateRescueRequestPriority
#   GET   /v1/rescue-requests/{requestId}/events - ListStatusEvents
#   POST  /v1/rescue-requests/{requestId}/events - AppendStatusEvent
#   GET   /v1/rescue-requests/{requestId}/current - GetCurrentState
#   GET   /v1/incidents/{incidentId}/rescue-requests - ListByIncident
#   GET   /v1/idempotency-keys/{idempotencyKeyHash} - GetIdempotencyRecord

# Command endpoints:
#   POST /v1/rescue-requests/{requestId}/triage - Triage
#   POST /v1/rescue-requests/{requestId}/assign - Assign
#   POST /v1/rescue-requests/{requestId}/start - Start
#   POST /v1/rescue-requests/{requestId}/resolve - Resolve
#   POST /v1/rescue-requests/{requestId}/cancel - Cancel

# Internal endpoints:
#   GET    /v1/internal/incidents/catalog - ListIncidentCatalog
#   DELETE /v1/internal/incidents/catalog - ClearIncidentCatalog
#   DELETE /v1/internal/incidents/catalog/with-requests - ClearIncidentCatalogWithRequests
#   DELETE /v1/internal/rescue-requests/orphaned - DeleteOrphanedRequests
#   DELETE /v1/internal/rescue-requests - ClearRequests
#   DELETE /v1/internal/maintenance/all - ClearAllData
