AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Rescue Request Service

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod, local]
  PrioritizationCreatedTopicArn:
    Type: String
    Default: ""
  PrioritizationUpdatedTopicArn:
    Type: String
    Default: ""
  MissionStatusChangedTopicArn:
    Type: String
    Default: ""
  InternalApiKeySecretName:
    Type: String
    Default: api-key-rs

Conditions:
  HasPrioritizationCreatedTopicArn: !Not [!Equals [!Ref PrioritizationCreatedTopicArn, ""]]
  HasPrioritizationUpdatedTopicArn: !Not [!Equals [!Ref PrioritizationUpdatedTopicArn, ""]]
  HasMissionStatusChangedTopicArn: !Not [!Equals [!Ref MissionStatusChangedTopicArn, ""]]

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        STAGE: !Ref Stage
        DYNAMODB_TABLE_NAME: !Ref RescueRequestTable
        IDEMPOTENCY_TABLE_NAME: !Ref IdempotencyTable
        INCIDENT_CATALOG_TABLE_NAME: !Ref IncidentCatalogTable
        SNS_TOPIC_ARN: !Ref RescueRequestEventsTopic
        ALLOWED_ORIGINS: https://rescue-request.phatphum.me,http://localhost:3000
        LOG_LEVEL: INFO
        INCIDENT_SYNC_SECRET_ID: !Ref IncidentTrackingApiSecret
        INTERNAL_API_KEY_SECRET_ID: !Ref InternalApiKeySecret
        INCIDENT_SYNC_HTTP_TIMEOUT_SECONDS: "30"

Resources:
  # DynamoDB Tables
  RescueRequestTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "RescueRequestTable-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "IdempotencyTable-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: idempotencyKeyHash
          AttributeType: S
      KeySchema:
        - AttributeName: idempotencyKeyHash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  IncidentCatalogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "IncidentCatalogTable-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: incidentId
          AttributeType: S
        - AttributeName: catalogPartition
          AttributeType: S
        - AttributeName: catalogSortKey
          AttributeType: S
      KeySchema:
        - AttributeName: incidentId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CatalogOrderIndex
          KeySchema:
            - AttributeName: catalogPartition
              KeyType: HASH
            - AttributeName: catalogSortKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  StreamEventLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "RescueRequestStreamEventLog-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: streamKey
          AttributeType: S
        - AttributeName: eventKey
          AttributeType: S
      KeySchema:
        - AttributeName: streamKey
          KeyType: HASH
        - AttributeName: eventKey
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # SNS Topic
  RescueRequestEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "rescue-request-events-v1-${Stage}"

  IncidentTrackingApiSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "rescue-request-service/incident-tracking/${Stage}"
      Description: Endpoint configuration for syncing incidents from IncidentTracking Service
      SecretString: '{"apiUrl":"https://incident-service.krittamark.com/api/v1/incidents","apiKey":"REPLACE_ME","accept":"application/json","transactionIdHeader":"X-IncidentTNX-Id"}'

  InternalApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref InternalApiKeySecretName
      Description: Internal maintenance API key for Rescue Request Service
      SecretString: '{"apiKey":"REPLACE_ME"}'

  RescueRequestEventsStreamQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "rescue-request-events-v1-stream-${Stage}"

  RescueRequestEventsStreamQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref RescueRequestEventsStreamQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowSnsPublish
            Effect: Allow
            Principal: "*"
            Action: sqs:SendMessage
            Resource: !GetAtt RescueRequestEventsStreamQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref RescueRequestEventsTopic

  RescueRequestEventsStreamSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref RescueRequestEventsTopic
      Protocol: sqs
      Endpoint: !GetAtt RescueRequestEventsStreamQueue.Arn

  RescuePrioritizationEvaluatedDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "rescue-prioritization-evaluated-dlq-${Stage}"

  RescuePrioritizationEvaluatedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "rescue-prioritization-evaluated-${Stage}"
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RescuePrioritizationEvaluatedDlq.Arn
        maxReceiveCount: 3

  RescuePrioritizationEvaluatedQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref RescuePrioritizationEvaluatedQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowPrioritizationCreatedTopicPublish
            Effect: Allow
            Principal: "*"
            Action: sqs:SendMessage
            Resource: !GetAtt RescuePrioritizationEvaluatedQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !If
                  - HasPrioritizationCreatedTopicArn
                  - !Ref PrioritizationCreatedTopicArn
                  - !Sub "arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:rescue-prioritization-created-v1*"
          - Sid: AllowPrioritizationUpdatedTopicPublish
            Effect: Allow
            Principal: "*"
            Action: sqs:SendMessage
            Resource: !GetAtt RescuePrioritizationEvaluatedQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !If
                  - HasPrioritizationUpdatedTopicArn
                  - !Ref PrioritizationUpdatedTopicArn
                  - !Sub "arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:rescue-prioritization-updated-v1*"

  RescuePrioritizationCreatedSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasPrioritizationCreatedTopicArn
    Properties:
      TopicArn: !Ref PrioritizationCreatedTopicArn
      Protocol: sqs
      Endpoint: !GetAtt RescuePrioritizationEvaluatedQueue.Arn

  RescuePrioritizationUpdatedSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasPrioritizationUpdatedTopicArn
    Properties:
      TopicArn: !Ref PrioritizationUpdatedTopicArn
      Protocol: sqs
      Endpoint: !GetAtt RescuePrioritizationEvaluatedQueue.Arn

  MissionStatusChangedDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "rescue-mission-status-changed-dlq-${Stage}"

  MissionStatusChangedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "rescue-mission-status-changed-${Stage}"
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt MissionStatusChangedDlq.Arn
        maxReceiveCount: 3

  MissionStatusChangedQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref MissionStatusChangedQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowMissionStatusChangedTopicPublish
            Effect: Allow
            Principal: "*"
            Action: sqs:SendMessage
            Resource: !GetAtt MissionStatusChangedQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !If
                  - HasMissionStatusChangedTopicArn
                  - !Ref MissionStatusChangedTopicArn
                  - !Sub "arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:mission-status-changed-v1*"

  MissionStatusChangedSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasMissionStatusChangedTopicArn
    Properties:
      TopicArn: !Ref MissionStatusChangedTopicArn
      Protocol: sqs
      Endpoint: !GetAtt MissionStatusChangedQueue.Arn

  # API Gateway
  RescueRequestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      TracingEnabled: true
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,X-Trace-Id,X-Idempotency-Key,If-Match,Authorization,api-key'"
        AllowMethods: "'GET,POST,PATCH,DELETE,OPTIONS'"

  # Public Handlers
  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.public.health_check.handler
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBReadPolicy:
            TableName: !Ref IdempotencyTable
        - DynamoDBReadPolicy:
            TableName: !Ref IncidentCatalogTable
      Events:
        HealthSummary:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/health
            Method: GET
        HealthLive:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/health/live
            Method: GET
        HealthReady:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/health/ready
            Method: GET

  CreateRescueRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.public.create_rescue_request.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - DynamoDBReadPolicy:
            TableName: !Ref IncidentCatalogTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueRequestEventsTopic.TopicName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/rescue-requests
            Method: POST

  ListIncidentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.public.list_incidents.handler
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref IncidentCatalogTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/incidents
            Method: GET

  InternalListIncidentCatalogFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.internal.list_incident_catalog.handler
      CodeUri: .
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource: !GetAtt IncidentCatalogTable.Arn
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref InternalApiKeySecret
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/internal/incidents/catalog
            Method: GET

  InternalMaintenanceFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.internal.maintenance.handler
      CodeUri: .
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
                - dynamodb:BatchWriteItem
                - dynamodb:DeleteItem
              Resource:
                - !GetAtt IncidentCatalogTable.Arn
                - !GetAtt RescueRequestTable.Arn
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref InternalApiKeySecret
      Events:
        ClearIncidentCatalog:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/internal/incidents/catalog
            Method: DELETE
        ClearIncidentCatalogWithRequests:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/internal/incidents/catalog/with-requests
            Method: DELETE
        DeleteOrphanedRequests:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/internal/rescue-requests/orphaned
            Method: DELETE
        ClearRequests:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/internal/rescue-requests
            Method: DELETE
        ClearAllData:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/internal/maintenance/all
            Method: DELETE

  CitizenTrackingLookupFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.public.citizen_tracking_lookup.handler
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RescueRequestTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/citizen/tracking/lookup
            Method: POST

  GetCitizenStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.public.get_citizen_status.handler
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RescueRequestTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/citizen/rescue-requests/{requestId}/status
            Method: GET

  CreateCitizenUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.public.create_citizen_update.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueRequestEventsTopic.TopicName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/citizen/rescue-requests/{requestId}/updates
            Method: POST

  ListCitizenUpdatesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.public.list_citizen_updates.handler
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RescueRequestTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/citizen/rescue-requests/{requestId}/updates
            Method: GET

  # Staff Handlers
  GetRescueRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.staff.get_rescue_request.handler
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RescueRequestTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/rescue-requests/{requestId}
            Method: GET

  PatchRescueRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.staff.patch_rescue_request.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueRequestEventsTopic.TopicName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/rescue-requests/{requestId}
            Method: PATCH

  UpdateRescueRequestPriorityFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.staff.update_rescue_request_priority.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueRequestEventsTopic.TopicName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/rescue-requests/{requestId}/priority
            Method: PATCH

  ListStatusEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.staff.list_status_events.handler
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RescueRequestTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/rescue-requests/{requestId}/events
            Method: GET

  AppendStatusEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.staff.append_status_event.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueRequestEventsTopic.TopicName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/rescue-requests/{requestId}/events
            Method: POST

  GetCurrentStateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.staff.get_current_state.handler
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RescueRequestTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/rescue-requests/{requestId}/current
            Method: GET

  ListByIncidentFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.staff.list_by_incident.handler
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RescueRequestTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/incidents/{incidentId}/rescue-requests
            Method: GET

  GetIdempotencyRecordFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.staff.get_idempotency_record.handler
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref IdempotencyTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/idempotency-keys/{idempotencyKeyHash}
            Method: GET

  # Command Handlers
  TriageFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.commands.triage.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueRequestEventsTopic.TopicName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/rescue-requests/{requestId}/triage
            Method: POST

  AssignFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.commands.assign.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueRequestEventsTopic.TopicName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/rescue-requests/{requestId}/assign
            Method: POST

  StartFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.commands.start.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueRequestEventsTopic.TopicName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/rescue-requests/{requestId}/start
            Method: POST

  ResolveFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.commands.resolve.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueRequestEventsTopic.TopicName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/rescue-requests/{requestId}/resolve
            Method: POST

  CancelFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.commands.cancel.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueRequestEventsTopic.TopicName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RescueRequestApi
            Path: /v1/rescue-requests/{requestId}/cancel
            Method: POST

  IngestPrioritizationEvaluationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.internal.ingest_rescue_request_evaluations.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueRequestEventsTopic.TopicName
      Events:
        PrioritizationEvaluatedQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt RescuePrioritizationEvaluatedQueue.Arn
            BatchSize: 5
            FunctionResponseTypes:
              - ReportBatchItemFailures

  IngestMissionStatusChangedFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.internal.ingest_mission_status_changed.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RescueRequestTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt RescueRequestEventsTopic.TopicName
      Events:
        MissionStatusChangedQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt MissionStatusChangedQueue.Arn
            BatchSize: 5
            FunctionResponseTypes:
              - ReportBatchItemFailures

  SyncIncidentCatalogFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.internal.sync_incidents.handler
      CodeUri: .
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentCatalogTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref IncidentTrackingApiSecret
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(30 minutes)
            Enabled: true

  StreamPollerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs20.x
      Handler: src/poller.handler
      CodeUri: stream-service/
      Timeout: 60
      Environment:
        Variables:
          SNS_STREAM_SQS_QUEUE_URL: !Ref RescueRequestEventsStreamQueue
          STREAM_TABLE_NAME: !Ref StreamEventLogTable
          STREAM_KEY: STREAM
          POLLER_LOCK_KEY: POLLER
          POLLER_LEASE_MS: "55000"
          EVENT_RETENTION_SECONDS: "86400"
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt RescueRequestEventsStreamQueue.QueueName
        - DynamoDBCrudPolicy:
            TableName: !Ref StreamEventLogTable
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Enabled: true

  StreamSseFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs20.x
      Handler: src/stream.handler
      CodeUri: stream-service/
      Timeout: 900
      Environment:
        Variables:
          STREAM_TABLE_NAME: !Ref StreamEventLogTable
          STREAM_KEY: STREAM
          ALLOWED_ORIGINS: https://rescue-request.phatphum.me,http://localhost:3000
          HEARTBEAT_MS: "15000"
          POLL_INTERVAL_MS: "1000"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref StreamEventLogTable

  StreamSseFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt StreamSseFunction.Arn
      AuthType: NONE
      InvokeMode: RESPONSE_STREAM

  StreamSseFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref StreamSseFunction
      Principal: "*"
      FunctionUrlAuthType: NONE

  StreamSseFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref StreamSseFunction
      Principal: "*"
      InvokedViaFunctionUrl: true

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${RescueRequestApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  RescueRequestTableName:
    Description: DynamoDB table name
    Value: !Ref RescueRequestTable
  IdempotencyTableName:
    Description: Idempotency table name
    Value: !Ref IdempotencyTable
  IncidentCatalogTableName:
    Description: Incident catalog table name
    Value: !Ref IncidentCatalogTable
  SnsTopicArn:
    Description: SNS topic ARN
    Value: !Ref RescueRequestEventsTopic
  SQSQueueUrl:
    Description: SQS queue URL subscribed to rescue request events topic
    Value: !Ref RescueRequestEventsStreamQueue
  RescuePrioritizationEvaluatedQueueUrl:
    Description: SQS queue URL for RescueRequestEvaluatedEvent ingestion
    Value: !Ref RescuePrioritizationEvaluatedQueue
  RescuePrioritizationEvaluatedQueueArn:
    Description: SQS queue ARN for RescueRequestEvaluatedEvent ingestion
    Value: !GetAtt RescuePrioritizationEvaluatedQueue.Arn
  MissionStatusChangedQueueUrl:
    Description: SQS queue URL for MissionStatusChanged ingestion
    Value: !Ref MissionStatusChangedQueue
  MissionStatusChangedQueueArn:
    Description: SQS queue ARN for MissionStatusChanged ingestion
    Value: !GetAtt MissionStatusChangedQueue.Arn
  IncidentTrackingApiSecretArn:
    Description: Secrets Manager ARN for IncidentTracking Service configuration
    Value: !Ref IncidentTrackingApiSecret
  InternalApiKeySecretArn:
    Description: Secrets Manager ARN for internal maintenance api-key
    Value: !Ref InternalApiKeySecret
  StreamServiceSseUrl:
    Description: SSE endpoint for the static frontend
    Value: !Join
      - ""
      - - !GetAtt StreamSseFunctionUrl.FunctionUrl
        - stream


