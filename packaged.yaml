      Handler: src/poller.handler
      CodeUri: s3://cs366-01-microservice-game-v01/82c3a39f7badfc8fe4f23e62aa5460c6
      Timeout: 60
      Environment:
        Variables:
          SNS_STREAM_SQS_QUEUE_URL:
            Ref: RescueRequestEventsStreamQueue
          STREAM_TABLE_NAME:
            Ref: StreamEventLogTable
          STREAM_KEY: STREAM
          POLLER_LOCK_KEY: POLLER
          POLLER_LEASE_MS: '55000'
          EVENT_RETENTION_SECONDS: '86400'
      Policies:
