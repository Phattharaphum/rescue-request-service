  StartFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.commands.start.handler
      CodeUri: s3://cs366-01-microservice-game-v01/8e68b232476b80a29b5aa7d34c64c386
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: RescueRequestTable
      - DynamoDBCrudPolicy:
          TableName:
