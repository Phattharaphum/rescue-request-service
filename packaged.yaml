          QueueName:
            Fn::GetAtt:
            - RescueRequestEventsStreamQueue
            - QueueName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: StreamEventLogTable
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Enabled: true
    Metadata:
      SamResourceId: StreamPollerFunction
  StreamSseFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs20.x
      Handler: src/stream.handler
      CodeUri: s3://cs366-01-microservice-game-v01/82c3a39f7badfc8fe4f23e62aa5460c6
      Timeout: 900
      Environment:
        Variables:
          STREAM_TABLE_NAME:
            Ref: StreamEventLogTable
          STREAM_KEY: STREAM
          ALLOWED_ORIGINS: https://rescue-request.phatphum.me,http://localhost:3000
          HEARTBEAT_MS: '15000'
          POLL_INTERVAL_MS: '1000'
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: StreamEventLogTable
    Metadata:
      SamResourceId: StreamSseFunction
  StreamSseFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn:
        Fn::GetAtt:
        - StreamSseFunction
        - Arn
      AuthType: NONE
      InvokeMode: RESPONSE_STREAM
    Metadata:
      SamResourceId: StreamSseFunctionUrl
  StreamSseFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName:
        Ref: StreamSseFunction
      Principal: '*'
      FunctionUrlAuthType: NONE
    Metadata:
      SamResourceId: StreamSseFunctionUrlPermission
  StreamSseFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Ref: StreamSseFunction
      Principal: '*'
      InvokedViaFunctionUrl: true
    Metadata:
      SamResourceId: StreamSseFunctionInvokePermission
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${RescueRequestApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  RescueRequestTableName:
    Description: DynamoDB table name
    Value:
      Ref: RescueRequestTable
  IdempotencyTableName:
    Description: Idempotency table name
    Value:
      Ref: IdempotencyTable
  IncidentCatalogTableName:
    Description: Incident catalog table name
    Value:
      Ref: IncidentCatalogTable
  SnsTopicArn:
    Description: SNS topic ARN
    Value:
      Ref: RescueRequestEventsTopic
  SQSQueueUrl:
    Description: SQS queue URL subscribed to rescue request events topic
    Value:
      Ref: RescueRequestEventsStreamQueue
  RescuePrioritizationEvaluatedQueueUrl:
    Description: SQS queue URL for RescueRequestEvaluatedEvent ingestion
    Value:
      Ref: RescuePrioritizationEvaluatedQueue
  RescuePrioritizationEvaluatedQueueArn:
    Description: SQS queue ARN for RescueRequestEvaluatedEvent ingestion
    Value:
      Fn::GetAtt:
      - RescuePrioritizationEvaluatedQueue
      - Arn
  IncidentTrackingApiSecretArn:
    Description: Secrets Manager ARN for IncidentTracking Service configuration
    Value:
      Ref: IncidentTrackingApiSecret
  StreamServiceSseUrl:
    Description: SSE endpoint for the static frontend
    Value:
      Fn::Join:
      - ''
      - - Fn::GetAtt:
          - StreamSseFunctionUrl
          - FunctionUrl
        - stream
