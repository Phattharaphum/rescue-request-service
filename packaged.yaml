AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Rescue Request Service
Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
    - dev
    - prod
    - local
  PrioritizationCreatedTopicArn:
    Type: String
    Default: ''
  PrioritizationUpdatedTopicArn:
    Type: String
    Default: ''
Conditions:
  HasPrioritizationCreatedTopicArn:
    Fn::Not:
    - Fn::Equals:
      - Ref: PrioritizationCreatedTopicArn
      - ''
  HasPrioritizationUpdatedTopicArn:
    Fn::Not:
    - Fn::Equals:
      - Ref: PrioritizationUpdatedTopicArn
      - ''
Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        STAGE:
          Ref: Stage
        DYNAMODB_TABLE_NAME:
          Ref: RescueRequestTable
        IDEMPOTENCY_TABLE_NAME:
          Ref: IdempotencyTable
        INCIDENT_CATALOG_TABLE_NAME:
          Ref: IncidentCatalogTable
        SNS_TOPIC_ARN:
          Ref: RescueRequestEventsTopic
        ALLOWED_ORIGINS: https://rescue-request.phatphum.me,http://localhost:3000
        LOG_LEVEL: INFO
        INCIDENT_SYNC_SECRET_ID:
          Ref: IncidentTrackingApiSecret
        INCIDENT_SYNC_HTTP_TIMEOUT_SECONDS: '30'
Resources:
  RescueRequestTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: RescueRequestTable-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
    Metadata:
      SamResourceId: RescueRequestTable
  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: IdempotencyTable-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: idempotencyKeyHash
        AttributeType: S
      KeySchema:
      - AttributeName: idempotencyKeyHash
        KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
    Metadata:
      SamResourceId: IdempotencyTable
  IncidentCatalogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: IncidentCatalogTable-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: incidentId
        AttributeType: S
      - AttributeName: catalogPartition
        AttributeType: S
      - AttributeName: catalogSortKey
        AttributeType: S
      KeySchema:
      - AttributeName: incidentId
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: CatalogOrderIndex
        KeySchema:
        - AttributeName: catalogPartition
          KeyType: HASH
        - AttributeName: catalogSortKey
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
    Metadata:
      SamResourceId: IncidentCatalogTable
  StreamEventLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: RescueRequestStreamEventLog-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: streamKey
        AttributeType: S
      - AttributeName: eventKey
        AttributeType: S
      KeySchema:
      - AttributeName: streamKey
        KeyType: HASH
      - AttributeName: eventKey
        KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
    Metadata:
      SamResourceId: StreamEventLogTable
  RescueRequestEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName:
        Fn::Sub: rescue-request-events-v1-${Stage}
    Metadata:
      SamResourceId: RescueRequestEventsTopic
  IncidentTrackingApiSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name:
        Fn::Sub: rescue-request-service/incident-tracking/${Stage}
      Description: Endpoint configuration for syncing incidents from IncidentTracking
        Service
      SecretString: '{"apiUrl":"https://incident-service.krittamark.com/api/v1/incidents","apiKey":"REPLACE_ME","accept":"application/json","transactionIdHeader":"X-IncidentTNX-Id"}'
    Metadata:
      SamResourceId: IncidentTrackingApiSecret
  RescueRequestEventsStreamQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName:
        Fn::Sub: rescue-request-events-v1-stream-${Stage}
    Metadata:
      SamResourceId: RescueRequestEventsStreamQueue
  RescueRequestEventsStreamQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
      - Ref: RescueRequestEventsStreamQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowSnsPublish
          Effect: Allow
          Principal: '*'
          Action: sqs:SendMessage
          Resource:
            Fn::GetAtt:
            - RescueRequestEventsStreamQueue
            - Arn
          Condition:
            ArnEquals:
              aws:SourceArn:
                Ref: RescueRequestEventsTopic
    Metadata:
      SamResourceId: RescueRequestEventsStreamQueuePolicy
  RescueRequestEventsStreamSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn:
        Ref: RescueRequestEventsTopic
      Protocol: sqs
      Endpoint:
        Fn::GetAtt:
        - RescueRequestEventsStreamQueue
        - Arn
    Metadata:
      SamResourceId: RescueRequestEventsStreamSubscription
  RescuePrioritizationEvaluatedDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName:
        Fn::Sub: rescue-prioritization-evaluated-dlq-${Stage}
    Metadata:
      SamResourceId: RescuePrioritizationEvaluatedDlq
  RescuePrioritizationEvaluatedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName:
        Fn::Sub: rescue-prioritization-evaluated-${Stage}
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
          - RescuePrioritizationEvaluatedDlq
          - Arn
        maxReceiveCount: 3
    Metadata:
      SamResourceId: RescuePrioritizationEvaluatedQueue
  RescuePrioritizationEvaluatedQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
      - Ref: RescuePrioritizationEvaluatedQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowPrioritizationCreatedTopicPublish
          Effect: Allow
          Principal: '*'
          Action: sqs:SendMessage
          Resource:
            Fn::GetAtt:
            - RescuePrioritizationEvaluatedQueue
            - Arn
          Condition:
            ArnLike:
              aws:SourceArn:
                Fn::If:
                - HasPrioritizationCreatedTopicArn
                - Ref: PrioritizationCreatedTopicArn
                - Fn::Sub: arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:rescue-prioritization-created-v1*
        - Sid: AllowPrioritizationUpdatedTopicPublish
          Effect: Allow
          Principal: '*'
          Action: sqs:SendMessage
          Resource:
            Fn::GetAtt:
            - RescuePrioritizationEvaluatedQueue
            - Arn
          Condition:
            ArnLike:
              aws:SourceArn:
                Fn::If:
                - HasPrioritizationUpdatedTopicArn
                - Ref: PrioritizationUpdatedTopicArn
                - Fn::Sub: arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:rescue-prioritization-updated-v1*
    Metadata:
      SamResourceId: RescuePrioritizationEvaluatedQueuePolicy
  RescuePrioritizationCreatedSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasPrioritizationCreatedTopicArn
    Properties:
      TopicArn:
        Ref: PrioritizationCreatedTopicArn
      Protocol: sqs
      Endpoint:
        Fn::GetAtt:
        - RescuePrioritizationEvaluatedQueue
        - Arn
    Metadata:
      SamResourceId: RescuePrioritizationCreatedSubscription
  RescuePrioritizationUpdatedSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasPrioritizationUpdatedTopicArn
    Properties:
      TopicArn:
        Ref: PrioritizationUpdatedTopicArn
      Protocol: sqs
      Endpoint:
        Fn::GetAtt:
        - RescuePrioritizationEvaluatedQueue
        - Arn
    Metadata:
      SamResourceId: RescuePrioritizationUpdatedSubscription
  RescueRequestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName:
        Ref: Stage
      TracingEnabled: true
      Cors:
        AllowOrigin: '''*'''
        AllowHeaders: '''Content-Type,X-Trace-Id,X-Idempotency-Key,If-Match,Authorization'''
        AllowMethods: '''GET,POST,PATCH,OPTIONS'''
    Metadata:
      SamResourceId: RescueRequestApi
  CreateRescueRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.public.create_rescue_request.handler
      CodeUri: s3://cs366-01-microservice-game-v01/25736db55485adda52a2e44130e22ec3
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: RescueRequestTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: IdempotencyTable
      - SNSPublishMessagePolicy:
          TopicName:
            Fn::GetAtt:
            - RescueRequestEventsTopic
            - TopicName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: RescueRequestApi
            Path: /v1/rescue-requests
            Method: POST
    Metadata:
      SamResourceId: CreateRescueRequestFunction
  ListIncidentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.public.list_incidents.handler
      CodeUri: s3://cs366-01-microservice-game-v01/25736db55485adda52a2e44130e22ec3
